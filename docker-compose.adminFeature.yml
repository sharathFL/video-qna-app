# Safety Logic Engine on 8089
  # Admin UI: upload CCTV frame, configure per-zone criteria, get Safe/Warning/Critical verdict
  # Uses your fine-tuned checkpoint — swap path to checkpoint-1266 for multiclass
services:
  safety-logic:
    build: .
    container_name: vlm_safety_logic
    working_dir: /workspace
    command: ["python", "src/serve_adminFeature.py",
              "--checkpoint", "/workspace/outputs/checkpoint-2056",
              "--port", "8089"]
    volumes:
      - ./src:/workspace/src:rw
      - ./outputs:/workspace/outputs:rw
      - ./cache/hf:/workspace/.cache/huggingface:rw
    environment:
      - HF_HOME=/workspace/.cache/huggingface
      - TRANSFORMERS_CACHE=/workspace/.cache/huggingface
      # CPU-only — no NVIDIA vars needed
    shm_size: "1gb"
    stdin_open: true
    tty: true
    ports:
      - "8089:8089"